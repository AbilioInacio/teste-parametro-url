<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador SHA-256 Base64 com Índice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Gerador de Hashes</h1>
        
        <div class="config-grid">
            <div class="input-group">
                <label>Início da Contagem</label>
                <input type="number" id="startRange" value="1">
            </div>
            <div class="input-group">
                <label>Fim da Contagem</label>
                <input type="number" id="endRange" value="5">
            </div>
            
            <div class="input-group">
                <label>Prefixo da Composição</label>
                <input type="text" id="prefixComp" placeholder="Ex: chave_">
            </div>
            <div class="input-group">
                <label>Sufixo da Composição</label>
                <input type="text" id="suffixComp" placeholder="Ex: _2024">
            </div>

            <div class="input-group full-width">
                <label>Texto antes do Hash (Saída)</label>
                <input type="text" id="preResultText" placeholder="Ex: token:">
            </div>
        </div>

        <button id="generateBtn">Gerar Hashes</button>

        <div id="results" class="results-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
